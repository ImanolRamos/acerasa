# ============================================================
# Koiote Cloud Stack — docker-compose.yml
#
# Stack completo en cloud:
#   Traefik → Vue3 + Node.js → TimescaleDB
#                            → Mosquitto (MQTT via VPN)
#
# Uso:
#   cp .env.example .env && nano .env
#   docker compose up -d --build
# ============================================================

services:

  # ----------------------------------------------------------
  # Traefik — proxy inverso HTTPS + Let's Encrypt
  # ----------------------------------------------------------
  traefik:
    image: traefik:v3.3
    container_name: koiote_${CLIENT_NAME}_traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=koiote_${CLIENT_NAME}_net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_acme:/letsencrypt
    networks:
      - koiote_net

  # ----------------------------------------------------------
  # Frontend — Vue3 compilado + Nginx
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_CLIENT_NAME: "${CLIENT_NAME}"
    container_name: koiote_${CLIENT_NAME}_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - koiote_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${CLIENT_NAME}-frontend.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.${CLIENT_NAME}-frontend.entrypoints=websecure"
      - "traefik.http.routers.${CLIENT_NAME}-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CLIENT_NAME}-frontend.loadbalancer.server.port=80"

  # ----------------------------------------------------------
  # Backend — Node.js + Express + MQTT subscriber
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
    container_name: koiote_${CLIENT_NAME}_backend
    restart: unless-stopped
    environment:
      CLIENT_NAME: "${CLIENT_NAME}"
      PORT: "3000"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}"
      MQTT_URL: "mqtt://mosquitto:1883"
      MQTT_USER: "${MQTT_USER}"
      MQTT_PASSWORD: "${MQTT_PASSWORD}"
      NODE_ENV: "production"
    expose:
      - "3000"
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    networks:
      - koiote_net

  # ----------------------------------------------------------
  # TimescaleDB — PostgreSQL + series temporales
  # ----------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: koiote_${CLIENT_NAME}_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - koiote_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Mosquitto — broker MQTT
  # Accesible desde la VPN en 10.90.0.1:1883
  # NO expuesto a internet
  # ----------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2.0
    container_name: koiote_${CLIENT_NAME}_mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      # Solo escucha en la IP WireGuard — no expuesto a internet
      - "${CLOUD_WG_IP}:1883:1883"
    networks:
      - koiote_net

  # ----------------------------------------------------------
  # Grafana — dashboards de métricas y datos MQTT
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.4
    container_name: koiote_${CLIENT_NAME}_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "https://grafana.${DOMAIN}/"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - koiote_net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.${CLIENT_NAME}-grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.${CLIENT_NAME}-grafana.entrypoints=websecure"
      - "traefik.http.routers.${CLIENT_NAME}-grafana.tls.certresolver=letsencrypt"
      - "traefik.http.services.${CLIENT_NAME}-grafana.loadbalancer.server.port=3000"

networks:
  koiote_net:
    name: koiote_${CLIENT_NAME}_net
    driver: bridge

volumes:
  timescaledb_data:
  grafana_data:
  mosquitto_data:
  mosquitto_log:
  traefik_acme:
