# ============================================================
# Koiote Edge — docker-compose.yml
#
# Uso:
#   cp .env.example .env && nano .env
#   docker compose up -d --build
#
# Puertos expuestos al host:
#   ${APP_PORT}  → frontend (Nginx → Vue3)
#
# Grafana y Prometheus NO se exponen al host.
# Se accede a ellos únicamente a través de la VPN WireGuard
# o redirigiendo un subdominio adicional en Traefik cloud.
# ============================================================

services:

  # ----------------------------------------------------------
  # Frontend: Vue3 compilado servido por Nginx
  # También hace de proxy inverso para /api → backend
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      args:
        VITE_CLIENT_NAME: "${CLIENT_NAME}"
    container_name: koiote_${CLIENT_NAME}_frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - koiote_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ----------------------------------------------------------
  # Backend: Node.js + Express
  # API REST + analytics → TimescaleDB + /metrics → Prometheus
  # ----------------------------------------------------------
  backend:
    build:
      context: ./backend
    container_name: koiote_${CLIENT_NAME}_backend
    restart: unless-stopped
    environment:
      CLIENT_NAME: "${CLIENT_NAME}"
      PORT: "3000"
      DATABASE_URL: "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@timescaledb:5432/${POSTGRES_DB}"
      NODE_ENV: "production"
    expose:
      - "3000"
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - koiote_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # TimescaleDB (PostgreSQL + extensión de series temporales)
  # ----------------------------------------------------------
  timescaledb:
    image: timescale/timescaledb:2.16.1-pg16
    container_name: koiote_${CLIENT_NAME}_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: "${POSTGRES_DB}"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./timescaledb/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - koiote_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ----------------------------------------------------------
  # Node Exporter — métricas del sistema operativo host
  # CPU, RAM, disco, red, etc.
  # ----------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: koiote_${CLIENT_NAME}_node_exporter
    restart: unless-stopped
    pid: host
    command:
      - "--path.rootfs=/host"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.filesystem"
      - "--collector.loadavg"
      - "--collector.netdev"
      - "--collector.uname"
    volumes:
      - /:/host:ro,rslave
    expose:
      - "9100"
    networks:
      - koiote_net

  # ----------------------------------------------------------
  # cAdvisor — métricas de contenedores Docker
  # ----------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: koiote_${CLIENT_NAME}_cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    expose:
      - "8080"
    networks:
      - koiote_net

  # ----------------------------------------------------------
  # Prometheus — scraping y almacenamiento de métricas
  # NO expuesto al host — acceso solo por VPN o Grafana interno
  # ----------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: koiote_${CLIENT_NAME}_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - koiote_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ----------------------------------------------------------
  # Grafana — visualización de métricas
  # Acceso: http://EDGE_WG_IP:GRAFANA_PORT (solo por VPN)
  # O bien añade una ruta Traefik adicional en cloud.
  # ----------------------------------------------------------
  grafana:
    image: grafana/grafana:11.1.4
    container_name: koiote_${CLIENT_NAME}_grafana
    restart: unless-stopped
    ports:
      # Solo escucha en la IP de WireGuard — no en 0.0.0.0
      - "${EDGE_WG_IP}:${GRAFANA_PORT}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - koiote_net

# ----------------------------------------------------------
# Red interna Docker — todos los contenedores se comunican
# por nombre de servicio. Nada sale al exterior salvo
# los puertos mapeados explícitamente arriba.
# ----------------------------------------------------------
networks:
  koiote_net:
    driver: bridge

volumes:
  timescaledb_data:
  grafana_data:
  prometheus_data:
